<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记忆翻牌 · 课堂游戏库</title>
  <style>
    :root {
      --primary: #f59e0b;
      --primary-dark: #d97706;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
      --success: #10b981;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 8px;
    }
    .topbar a { color: var(--text-muted); text-decoration: none; font-size: .9rem; }
    .topbar a:hover { color: var(--text); }
    .topbar-title { font-size: 1.1rem; font-weight: 700; }

    .screen { display: none; flex: 1; }
    .screen.active { display: flex; flex-direction: column; }

    /* Setup */
    #setupScreen { align-items: center; justify-content: center; padding: 40px 16px; }
    .setup-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 40px;
      width: 100%; max-width: 520px;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }
    .setup-card h2 { font-size: 1.5rem; margin-bottom: 8px; }
    .setup-card p { color: var(--text-muted); font-size: .92rem; margin-bottom: 24px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: .88rem; color: var(--text-muted); margin-bottom: 6px; }
    .field select {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .95rem;
    }
    .field select:focus { outline: 2px solid var(--primary); }
    .card-input-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
    .card-input-row { display: flex; gap: 8px; align-items: center; }
    .card-input-row input {
      flex: 1;
      padding: 8px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .88rem;
    }
    .card-input-row input:focus { outline: 2px solid var(--primary); }
    .del-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
    .del-btn:hover { color: var(--danger); }
    .btn {
      padding: 9px 18px; border-radius: 8px; border: none;
      cursor: pointer; font-size: .9rem; font-weight: 600; transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--primary); color: #1a1a1a; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: .8rem; }

    /* Game */
    #gameScreen { align-items: center; padding: 24px 16px; }
    .game-wrapper { width: 100%; max-width: 860px; }

    .stats-row {
      display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .stat {
      background: var(--surface);
      border-radius: 10px;
      padding: 10px 20px;
      text-align: center;
    }
    .stat .v { font-size: 1.4rem; font-weight: 800; }
    .stat .l { font-size: .72rem; color: var(--text-muted); }

    /* Memory grid */
    .mem-grid {
      display: grid;
      gap: 10px;
    }

    /* Card flip */
    .mem-card {
      aspect-ratio: 1;
      perspective: 800px;
      cursor: pointer;
    }
    .mem-card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .45s cubic-bezier(.4,0,.2,1);
      border-radius: 12px;
    }
    .mem-card.flipped .mem-card-inner { transform: rotateY(180deg); }
    .mem-card.matched .mem-card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      font-weight: 700;
      overflow: hidden;
    }
    .card-back {
      background: linear-gradient(135deg, #334155, #1e293b);
      border: 2px solid var(--border);
      font-size: 1.8rem;
    }
    .card-front {
      background: var(--surface);
      border: 2px solid var(--primary);
      transform: rotateY(180deg);
      font-size: 1.1rem;
      text-align: center;
      padding: 8px;
      line-height: 1.3;
      word-break: break-all;
    }
    .mem-card.matched .card-front {
      border-color: var(--success);
      background: rgba(16,185,129,.15);
      color: var(--success);
    }
    .mem-card.wrong .card-front {
      border-color: var(--danger);
      background: rgba(239,68,68,.15);
      animation: shakeCard .35s;
    }
    @keyframes shakeCard {
      0%,100%{transform:rotateY(180deg) translateX(0)} 25%{transform:rotateY(180deg) translateX(-5px)} 75%{transform:rotateY(180deg) translateX(5px)}
    }

    /* Result */
    #resultScreen { align-items: center; justify-content: center; padding: 40px 16px; }
    .result-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 400px; width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }
    .result-card .emoji { font-size: 4rem; margin-bottom: 12px; }
    .big-num { font-size: 3.5rem; font-weight: 900; color: var(--primary); margin: 12px 0; }
    .result-row { display: flex; justify-content: center; gap: 28px; margin: 16px 0; }
    .result-row .item .n { font-size: 1.4rem; font-weight: 800; }
    .result-row .item .l { font-size: .78rem; color: var(--text-muted); }
    .result-actions { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
  </style>
</head>
<body>

<div class="topbar">
  <a href="../../index.html">← 返回游戏库</a>
  <div class="topbar-title">🃏 记忆翻牌</div>
  <div></div>
</div>

<!-- Setup -->
<div class="screen active" id="setupScreen">
  <div class="setup-card">
    <h2>🃏 记忆翻牌</h2>
    <p>翻开两张相同的卡片即为配对成功，记住每张牌的位置，挑战最少翻牌次数！</p>

    <div class="field">
      <label>难度（牌对数）</label>
      <select id="pairsCount">
        <option value="6">简单（6 对，4×3）</option>
        <option value="8" selected>中等（8 对，4×4）</option>
        <option value="12">困难（12 对，4×6）</option>
        <option value="18">超难（18 对，6×6）</option>
      </select>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:.88rem;color:var(--text-muted)">自定义卡片内容（留空使用默认 emoji）</div>
      <button class="btn btn-outline btn-sm" onclick="clearCardList()">清空</button>
    </div>
    <div class="card-input-list" id="cardInputList"></div>
    <button class="btn btn-outline" style="width:100%;margin-bottom:20px" onclick="addCardRow()">+ 添加卡片内容</button>

    <div style="display:flex;gap:10px">
      <button class="btn btn-outline" style="flex:1" onclick="loadDefaultCards()">使用默认</button>
      <button class="btn btn-primary" style="flex:2;padding:13px;font-size:1rem" onclick="startGame()">开始游戏 🚀</button>
    </div>
  </div>
</div>

<!-- Game -->
<div class="screen" id="gameScreen">
  <div class="game-wrapper">
    <div class="stats-row">
      <div class="stat"><div class="v" id="flipsVal">0</div><div class="l">翻牌次数</div></div>
      <div class="stat"><div class="v" id="matchedVal">0</div><div class="l">已配对</div></div>
      <div class="stat"><div class="v" id="remainVal">0</div><div class="l">剩余</div></div>
      <div class="stat"><div class="v" id="timeVal">0</div><div class="l">用时(秒)</div></div>
      <div style="flex:1"></div>
      <button class="btn btn-outline btn-sm" onclick="goSetup()" style="align-self:center">重新设置</button>
      <button class="btn btn-outline btn-sm" onclick="restartGame()" style="align-self:center">重玩 🔄</button>
    </div>
    <div class="mem-grid" id="memGrid"></div>
  </div>
</div>

<!-- Result -->
<div class="screen" id="resultScreen">
  <div class="result-card">
    <div class="emoji">🏅</div>
    <h2>全部配对！</h2>
    <div style="color:var(--text-muted)">翻牌次数</div>
    <div class="big-num" id="resFlips">0</div>
    <div class="result-row">
      <div class="item"><div class="n" id="resTime">0</div><div class="l">秒</div></div>
      <div class="item"><div class="n" id="resPairs">0</div><div class="l">对</div></div>
    </div>
    <div class="result-actions">
      <button class="btn btn-outline" onclick="goSetup()">重新设置</button>
      <button class="btn btn-primary" onclick="restartGame()">再来一次 🔄</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_EMOJIS = ['🍎','🍌','🍇','🍓','🍉','🍑','🍒','🍋','🥝','🍍','🥥','🍆','🥕','🌽','🍄','🌸','🐶','🐱','🐸','🦁','🐯','🐻','🦊','🐺','🐼','🐨','🦋','🐝'];

let cards       = [];
let flipped     = [];
let matchedSet  = new Set();
let flips       = 0;
let elapsed     = 0;
let timerInt    = null;
let locked      = false;
let pairsTotal  = 8;
let customCards = [];

// ── Setup ──
function addCardRow(val='') {
  const list = document.getElementById('cardInputList');
  const row  = document.createElement('div');
  row.className = 'card-input-row';
  row.innerHTML = `<input type="text" placeholder="卡片文字或 emoji" value="${val}" maxlength="10" />
    <button class="del-btn" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(row);
}
function clearCardList() { document.getElementById('cardInputList').innerHTML = ''; }
function loadDefaultCards() { clearCardList(); }

function startGame() {
  pairsTotal = parseInt(document.getElementById('pairsCount').value);
  // collect custom
  const inputs = document.querySelectorAll('.card-input-row input');
  customCards = [...inputs].map(i => i.value.trim()).filter(Boolean);

  let pool;
  if (customCards.length >= pairsTotal) {
    pool = customCards.slice(0, pairsTotal);
  } else {
    pool = DEFAULT_EMOJIS.slice(0, pairsTotal);
  }
  // duplicate and shuffle
  cards = shuffle([...pool, ...pool].map((v, i) => ({ id: i, value: v, pairId: i % pairsTotal })));
  flipped = [];
  matchedSet = new Set();
  flips = elapsed = 0;
  locked = false;

  updateStats();
  renderGrid();
  showScreen('gameScreen');
  clearInterval(timerInt);
  timerInt = setInterval(() => { elapsed++; document.getElementById('timeVal').textContent = elapsed; }, 1000);
}

// ── Grid ──
function renderGrid() {
  const grid = document.getElementById('memGrid');
  const cols = pairsTotal <= 6 ? 4 : pairsTotal <= 8 ? 4 : pairsTotal <= 12 ? 4 : 6;
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'mem-card';
    el.dataset.index = i;
    el.innerHTML = `<div class="mem-card-inner">
      <div class="card-face card-back">🎴</div>
      <div class="card-face card-front">${card.value}</div>
    </div>`;
    el.onclick = () => flipCard(i, el);
    grid.appendChild(el);
  });
}

function flipCard(idx, el) {
  if (locked || el.classList.contains('flipped') || el.classList.contains('matched')) return;
  el.classList.add('flipped');
  flipped.push({ idx, el, pairId: cards[idx].pairId });
  flips++;
  updateStats();

  if (flipped.length === 2) {
    locked = true;
    const [a, b] = flipped;
    if (a.pairId === b.pairId) {
      // match!
      setTimeout(() => {
        a.el.classList.add('matched');
        b.el.classList.add('matched');
        matchedSet.add(a.pairId);
        flipped = [];
        locked  = false;
        updateStats();
        if (matchedSet.size === pairsTotal) setTimeout(endGame, 300);
      }, 300);
    } else {
      // no match
      setTimeout(() => {
        a.el.classList.add('wrong');
        b.el.classList.add('wrong');
        setTimeout(() => {
          a.el.classList.remove('flipped','wrong');
          b.el.classList.remove('flipped','wrong');
          flipped = [];
          locked  = false;
        }, 600);
      }, 300);
    }
  }
}

function updateStats() {
  document.getElementById('flipsVal').textContent   = flips;
  document.getElementById('matchedVal').textContent = matchedSet.size;
  document.getElementById('remainVal').textContent  = pairsTotal - matchedSet.size;
}

function endGame() {
  clearInterval(timerInt);
  document.getElementById('resFlips').textContent = flips;
  document.getElementById('resTime').textContent  = elapsed;
  document.getElementById('resPairs').textContent = pairsTotal;
  showScreen('resultScreen');
}

function goSetup() { clearInterval(timerInt); showScreen('setupScreen'); }
function restartGame() { startGame(); }

// ── Utils ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
</script>
</body>
</html>
