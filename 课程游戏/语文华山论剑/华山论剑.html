                         animationDelay: `${idx * 0.04}s`,
                         zIndex: 50 + idx
                       }} />
                );
              })}
              
              {/* 紫色碎片从中心向8个方向飞溅 */}
              {[...Array(8)].map((_, idx) => {
                const angle = (idx / 8) * Math.PI * 2;
                return [...Array(5)].map((_, pidx) => (
                  <div key={`shatter-spray-${idx}-${pidx}`}
                       style={{
                         position: 'absolute',
                         left: '50%',
                         top: '50%',
                         width: `${6 + Math.random() * 4}px`,
                         height: `${6 + Math.random() * 4}px`,
                         borderRadius: '50%',
                         background: `hsl(${260 + Math.random() * 20}, 80%, ${50 + Math.random() * 30}%)`,
                         boxShadow: `0 0 ${8 + Math.random() * 4}px rgba(123,104,238,0.8)`,
                         animation: `shatterSprayShoot ${0.7 + Math.random() * 0.3}s ease-out forwards`,
                         animationDelay: `${0.15 + idx * 0.05 + pidx * 0.08}s`,
                         transform: `translate(-50%, -50%) rotate(${angle}rad)`
                       }} />
                ));
              })}
            </>
          )}
          
          {/* ☄️ 火弩箭 - 5支箭穿洞+焦灼 */}
          {uid === 3 && (
            <>
              {/* 5支火弩箭依次射下 */}
              {[0, 1, 2, 3, 4].map((idx) => {
                const xPos = 15 + (idx % 5) * 17.5;  // 均匀分散
                const delay = idx * 0.2;  // 0.2s间隔
                return (
                  <div key={`arrow-${idx}`}
                       style={{
                         position: 'absolute',
                         left: xPos + '%',
                         top: '-80px',
                         transform: 'translateX(-50%)',
                         width: '18px',
                         height: '50px',
                         background: 'linear-gradient(180deg, #FF6B35 0%, #FF8C00 50%, #FF4500 100%)',
                         clipPath: 'polygon(50% 0%, 100% 35%, 75% 100%, 50% 85%, 25% 100%, 0% 35%)',
                         boxShadow: '0 0 20px rgba(255, 107, 53, 0.9)',
                         animation: `arrowPierceFall 0.6s ease-in forwards`,
                         animationDelay: `${delay}s`,
                         zIndex: 70 - idx
                       }} />
                );
              })}
              
              {/* 5个破洞喷火 - 五角形排列 */}
              {[0, 1, 2, 3, 4].map((idx) => {
                const angle = (idx / 5) * Math.PI * 2;
                const x = 50 + Math.cos(angle) * 28;
                const y = 50 + Math.sin(angle) * 28;
                const burnDelay = 0.2 + idx * 0.2;
                
                return (
                  <div key={`burn-hole-${idx}`}
                       style={{
                         position: 'absolute',
                         left: x + '%',
                         top: y + '%',
                         transform: 'translate(-50%, -50%)',
                         width: '45px',
                         height: '45px',
                         borderRadius: '50%',
                         background: `radial-gradient(circle at 40% 30%, 
                           rgba(255,255,150,0.8) 0%, 
                           rgba(255,165,0,0.7) 35%, 
                           rgba(255,69,0,0.5) 65%,
                           rgba(100,20,0,0.3) 100%)`,
                         boxShadow: `0 0 30px rgba(255,140,0,0.95), 
                           inset -2px -2px 8px rgba(0,0,0,0.6),
                           0 0 15px rgba(255,200,100,0.5)`,
                         animation: `fireHoleGlow 0.6s ease-out forwards`,
                         animationDelay: `${burnDelay}s`,
                         zIndex: 45 + idx
                       }} />
                );
              })}
              
              {/* 卡片焦灼覆盖层 - 从中心扩散至全卡片 */}
              <div style={{
                position: 'absolute',
                inset: 0,
                background: `radial-gradient(ellipse at 50% 50%, 
                  rgba(255,140,0,0.2) 0%, 
                  rgba(255,100,0,0.3) 40%, 
                  rgba(220,50,0,0.25) 100%)`,
                animation: `cardBurnScorchOverlay 1.2s ease-out forwards`,
                animationDelay: '0.4s',
                pointerEvents: 'none'
              }} />
              
              {/* 火焰粒子从5个洞喷出 */}
              {[0, 1, 2, 3, 4].map((holeIdx) => {
                const angle = (holeIdx / 5) * Math.PI * 2;
                const x = 50 + Math.cos(angle) * 28;
                const y = 50 + Math.sin(angle) * 28;
                
                return [...Array(8)].map((_, pidx) => {
                  const pAngle = angle + (Math.random() - 0.5) * Math.PI * 0.5;
                  return (
                    <div key={`fire-spray-${holeIdx}-${pidx}`}
                         style={{
                           position: 'absolute',
                           left: x + '%',
                           top: y + '%',
                           width: '5px',
                           height: '5px',
                           borderRadius: '50%',
                           background: `hsl(${25 + Math.random() * 15}, 100%, ${65 - Math.random() * 25}%)`,
                           boxShadow: `0 0 12px rgba(255,${100 + Math.random() * 55},0,0.8)`,
                           animation: `fireSprayShot ${0.7 + Math.random() * 0.3}s ease-out forwards`,
                           animationDelay: `${0.25 + holeIdx * 0.2 + pidx * 0.05}s`,
                           transform: `translate(-50%, -50%) rotate(${pAngle}rad)`
                         }} />
                  );
                });
              })}
            </>
          )}
          
          {/* ⚡ 雷鸣 - 3道闪电焦痕+电灼overlay+反色闪烁 */}
          {uid === 4 && (
            <>
              {/* 卡片反色闪烁（3次闪烁） */}
              <div style={{
                position: 'absolute',
                inset: 0,
                animation: 'cardLightningFlash 0.6s ease-in-out forwards',
                animationDelay: '0.2s',
                pointerEvents: 'none'
              }} />
              
              {/* 3条天雷闪电焦痕炙刻 */}
              {[0, 1, 2].map((idx) => {
                const startX = 20 + idx * 30;  // 从左/中/右3个位置
                const startY = -50;
                const endX = startX + (idx === 0 ? 0 : idx === 1 ? -15 : 15);  // 斜角
                const endY = 100;
                
                return (
                  <div key={`lightning-bolt-${idx}`}
                       style={{
                         position: 'absolute',
                         left: startX + '%',
                         top: startY + 'px',
                         width: '3px',
                         height: '150%',
                         background: `linear-gradient(180deg, 
                           rgba(100,200,255,0) 0%,
                           rgba(100,200,255,0.9) 15%,
                           rgba(0,100,255,0.95) 50%,
                           rgba(50,150,255,0.8) 85%,
                           rgba(100,200,255,0) 100%)`,
                         boxShadow: `0 0 15px rgba(100,200,255,0.9), 
                           0 0 30px rgba(0,100,255,0.6)`,
                         animation: `lightningBoltStrike ${0.4}s ease-in forwards`,
                         animationDelay: `${0.3 + idx * 0.15}s`,
                         zIndex: 60 - idx,
                         filter: 'blur(0.5px)'
                       }} />
                );
              })}
              
              {/* 3条闪电焦痕标记 - 细线（保留痕迹） */}
              {[0, 1, 2].map((idx) => {
                const xPos = 20 + idx * 30;
                return (
                  <div key={`scorch-mark-${idx}`}
                       style={{
                         position: 'absolute',
                         left: xPos + '%',
                         top: 0,
                         bottom: 0,
                         width: '2px',
                         background: 'linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.3) 35%, rgba(100,100,100,0.25) 65%, rgba(0,0,0,0.35) 100%)',
                         boxShadow: '0 0 8px rgba(50,50,50,0.5)',
                         animation: `scorchMarkFade 1s ease-out forwards`,
                         animationDelay: `${0.35 + idx * 0.15}s`,
                         zIndex: 30
                       }} />
                );
              })}
              
              {/* 电灼overlay - 紫蓝色+焦黑点缀 */}
              <div style={{
                position: 'absolute',
                inset: 0,
                background: `linear-gradient(135deg, 
                  rgba(100,150,200,0.15) 0%,
                  rgba(80,100,200,0.2) 50%,
                  rgba(60,80,150,0.1) 100%)`,
                animation: `electricBurnOverlay 1s ease-out forwards`,
                animationDelay: '0.4s',
                pointerEvents: 'none'
              }} />
              
              {/* 电弧残留闪光粒子 */}
              {[...Array(15)].map((_, idx) => {
                const xPos = 10 + Math.random() * 80;
                const yPos = Math.random() * 100;
                return (
                  <div key={`electric-spark-${idx}`}
                       style={{
                         position: 'absolute',
                         left: xPos + '%',
                         top: yPos + '%',
                         width: `${2 + Math.random() * 3}px`,
                         height: `${2 + Math.random() * 3}px`,
                         borderRadius: '50%',
                         background: `hsl(${200 + Math.random() * 30}, 100%, ${60 + Math.random() * 30}%)`,
                         boxShadow: `0 0 ${6 + Math.random() * 4}px rgba(100,150,255,0.9)`,
                         animation: `electricSparkFade ${0.4 + Math.random() * 0.2}s ease-out forwards`,
                         animationDelay: `${0.35 + Math.random() * 0.3}s`,
                         transform: `translate(-50%, -50%)`
                       }} />
                );
              })}
            </>
          )}
        </div>
      );
    }
    return null;
  };

  // --- 50% 严格无缝人像卡片渲染 ---
  const renderHalfScreenCard = (side, player, color, trophies, isReady, isDead, hpCount) => {
    const isLeft = side === 'left';
    const maxHP = 3;
    const hpPct = Math.max(0, Math.min(1, hpCount / maxHP)) * 100;
    const isLowHP = hpCount <= 1 && hpCount > 0;

    // 计算等级边框
    let rankClass = '';
    if (hpCount >= 3) rankClass = 'card-rank-gold';
    else if (hpCount >= 2) rankClass = 'card-rank-silver';
    else if (hpCount >= 1) rankClass = 'card-rank-bronze';

    // 计算卡片自身的物理响应形变
    let physicalClass = '';
    if (gameState === 'ultimate_impact' || gameState === 'result') {
       if (actionEffect?.side === side) {
          if (actionEffect.type === 'miss') physicalClass = 'react-injury';
          else if (actionEffect.type === 'hit') physicalClass = ULTIMATE_INFO[actionEffect.ultimateId].reactClass;
       } else if (actionEffect?.type === 'hit' && actionEffect?.attacker === side) {
          if (actionEffect.ultimateId === 3) physicalClass = 'react-cast-shake';
       }
    }

    // 判定当前阶段是否应该置灰：只在result阶段且确认死亡时置灰
    const shouldBeGrayscale = gameState === 'result' && deadSide === side;
    const isDeathExiting = shouldBeGrayscale && gameState === 'result';
    const isHPLossing = gameState === 'result' && actionEffect?.side === side && actionEffect?.type === 'hit' && deadSide !== side;

    return (
      <div className={`half-card ${rankClass} ${isLeft ? 'half-card-left border-r-[12px] border-[#111]' : 'half-card-right'}`}>

        {/* 静态裁剪层：不参与形变，确保 overflow:hidden 对 filter 子元素有效 */}
        <div className="absolute inset-0 overflow-hidden">
          {/* 底层物理形变主卡片 (背景与主体共进退) */}
          <div className={`absolute inset-0 w-full h-full flex flex-col items-center transition-colors duration-500 origin-center ${physicalClass} ${isDeathExiting ? 'death-exit-animation' : ''} ${isHPLossing ? 'hp-loss-pulse' : ''}`}
               style={{ backgroundColor: shouldBeGrayscale ? '#888' : color, filter: shouldBeGrayscale ? 'grayscale(1) brightness(0.65)' : 'none' }}>

           {/* 卡片内部视觉特效层 (被 overflow-hidden 截断) */}
           {renderVFXInsideCard(side)}

           {/* 姓名定位于上方 20% - 印章风格 */}
           <h2 className={`absolute top-[20%] w-full text-center text-[15vh] font-black tracking-widest z-20 ${shouldBeGrayscale ? 'text-gray-600' : 'text-white'}`}
               style={{
                 textShadow: shouldBeGrayscale ? 'none' : '0 8px 0 rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.3)',
                 filter: shouldBeGrayscale ? 'grayscale(1)' : 'drop-shadow(0 0 10px rgba(255,255,255,0.5))'
               }}>
              {player?.name}
           </h2>

           {/* 交互按钮定位于下方 10% - 印章/竹简风格 */}
           <div className="absolute bottom-[10%] w-full flex justify-center z-50">
              {gameState === 'ready' && !isReady && !isDead && (
                <button onClick={() => handleReady(side)}
                        className="w-2/3 py-[4vh] text-[6vh] bg-white text-[#2C2C2C] btn-switch font-black tracking-widest"
                        style={{
                          background: 'linear-gradient(135deg, #F8F4E6 0%, #fff 50%, #F8F4E6 100%)',
                          boxShadow: '0 8px 0 #2C2C2C, inset 0 2px 4px rgba(255,255,255,0.5), 0 0 20px rgba(240,194,57,0.3)'
                        }}>
                  准备
                </button>
              )}
              {gameState === 'ready' && isReady && !isDead && (
                <button disabled
                        className="w-2/3 py-[4vh] text-[6vh] text-gray-500 btn-switch font-black tracking-widest"
                        style={{
                          background: 'linear-gradient(135deg, #E0E0E0 0%, #D0D0D0 50%, #E0E0E0 100%)',
                          boxShadow: '0 0 0 #2C2C2C, inset 0 2px 4px rgba(0,0,0,0.2)'
                        }}>
                  就绪
                </button>
              )}
              {gameState === 'battle' && !isDead && (
                <button onClick={() => handleAttack(side)}
                        className="w-5/6 py-[5vh] text-[7vh] bg-white text-[#2C2C2C] btn-switch tracking-widest overflow-hidden whitespace-nowrap px-[2vw] font-black"
                        style={{
                          background: 'linear-gradient(135deg, #F8F4E6 0%, #fff 50%, #F8F4E6 100%)',
                          boxShadow: '0 8px 0 #2C2C2C, inset 0 2px 4px rgba(255,255,255,0.5), 0 0 30px rgba(240,194,57,0.5)',
                          animation: 'pulse 1s ease-in-out infinite'
                        }}>
                   {displayedOption || '...'}
                </button>
              )}
           </div>

           {/* 老虎机覆盖层 - 卷轴风格 */}
           {gameState === 'slot_machine' && deadSide === side && (
             <div className="absolute inset-0 backdrop-blur-md flex flex-col items-center justify-center z-[120]"
                  style={{
                    background: 'linear-gradient(135deg, rgba(248,244,230,0.95) 0%, rgba(255,255,255,0.95) 100%)'
                  }}>
                <span className="text-white bg-[#C93756] px-6 py-2 rounded-full mb-[2vh] text-[3vh] tracking-widest font-black border-4 border-[#2C2C2C]"
                      style={{boxShadow: '4px 4px 0 #2C2C2C, 0 0 20px rgba(201,55,86,0.5)'}}>
                  新魂降临
                </span>
                <span className="text-[12vh] text-[#2C2C2C] font-black tracking-widest mt-8 mb-16"
                      style={{
                        textShadow: '4px 4px 0 rgba(240,194,57,0.5)',
                        filter: 'drop-shadow(0 0 10px rgba(240,194,57,0.3))'
                      }}>
                  {slotName}
                </span>
                <button onClick={stopSlotMachine}
                        className="px-[8vh] py-[3vh] text-[5vh] text-[#2C2C2C] btn-switch font-black tracking-widest"
                        style={{
                          background: 'linear-gradient(135deg, #F0C239 0%, #FFD700 50%, #F0C239 100%)',
                          boxShadow: '0 8px 0 #2C2C2C, inset 0 2px 4px rgba(255,255,255,0.5), 0 0 30px rgba(240,194,57,0.6)'
                        }}>
                  定格
                </button>
             </div>
           )}
        </div>
        {/* 静态裁剪层闭合 */}
        </div>

        {/* 分割线（不参与形变） */}
        <div className={`divider-line ${isLeft ? 'divider-line-left' : 'divider-line-right'}`} />

        {/* 血条 HP Bar（不参与形变，始终清晰） */}
        {!shouldBeGrayscale && (
          <div className={`absolute top-[3vh] ${isLeft ? 'right-[3vh]' : 'left-[3vh]'} z-50`}
               style={{ width: '30%' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
              {Array.from({ length: Math.max(0, hpCount) }).map((_, i) => (
                <span key={i} style={{ fontSize: '2.5vh', filter: 'drop-shadow(0 0 6px rgba(201,55,86,0.8))' }}>❤️</span>
              ))}
            </div>
            <div className="hp-bar-track">
              <div className={`hp-bar-fill ${isLowHP ? 'low' : ''}`} style={{ width: `${hpPct}%` }} />
            </div>
          </div>
        )}

        {/* 擂主标记 */}
        {champSide === side && (
          <div className="champion-badge" />
        )}
      </div>
    );
  };

  const isLeftDead = leftHP <= 0 && gameState !== 'setup' && gameState !== 'ready';
  const isRightDead = rightHP <= 0 && gameState !== 'setup' && gameState !== 'ready';

  // --- Setup / Gameover UI ---
  if (gameState === 'setup') {
    return (
      <div className="w-screen h-screen bg-[#111] flex items-center justify-center overflow-hidden font-sans">
        <style>{customStyles}</style>
        {renderQBankSidebar()}
        <div className="relative flex flex-col items-center justify-center p-8 bg-theme-ink transition-colors duration-1000 theme-ink overflow-hidden"
             style={{ aspectRatio: '16/9', width: 'min(100vw, 177.77vh)', height: 'min(100vh, 56.25vw)' }}>
          {renderBackground()}
          <h1 className="text-[14vh] font-black text-[#2C2C2C] tracking-widest mb-4 z-10 font-zhi"
              style={{
                textShadow: '6px 6px 0 rgba(240,194,57,0.6), 0 0 30px rgba(240,194,57,0.3)',
                filter: 'drop-shadow(0 0 20px rgba(240,194,57,0.4))'
              }}>
            武林诗词
          </h1>
          <p className="text-[3.5vh] text-[#2C2C2C] px-8 py-2 rounded-full border-[6px] border-[#2C2C2C] mb-12 tracking-widest font-bold z-10"
             style={{
               background: 'linear-gradient(135deg, #F8F4E6 0%, #fff 50%, #F8F4E6 100%)',
               boxShadow: '6px 6px 0 #2C2C2C, 0 0 20px rgba(240,194,57,0.3)'
             }}>
            华山论剑 · 卡通中国风
          </p>
          <div className="space-y-6 text-left mb-12 flex gap-8 w-2/3 z-10">
            <div className="flex-1 p-8 relative rounded-[40px] transform -rotate-2 hover:rotate-0 transition"
                 style={{
                   background: 'linear-gradient(135deg, #F8F4E6 0%, #fff 50%, #F8F4E6 100%)',
                   border: '6px solid #2C2C2C',
                   boxShadow: '8px 8px 0 #2C2C2C'
                 }}>
              <div className="absolute -top-[2.5vh] left-[3vh] px-6 py-1 text-white font-black text-[2.5vh] border-[6px] border-[#2C2C2C] rounded-full"
                   style={{
                     background: 'linear-gradient(135deg, #F0C239 0%, #FFD700 50%, #F0C239 100%)',
                     boxShadow: '4px 4px 0 #2C2C2C'
                   }}>
                名册导入
              </div>
              <input type="file" accept=".xlsx, .xls" onChange={handleFileUpload}
                     className="w-full mt-4 text-[#2C2C2C] font-bold cursor-pointer file:mr-4 file:py-2 file:px-6 file:border-[6px] file:border-[#2C2C2C] file:rounded-full file:text-white file:font-black hover:file:brightness-110 transition"
                     style={{
                       filter: 'none'
                     }} />
            </div>
            <div className="flex-1 p-8 relative rounded-[40px] transform rotate-2 hover:rotate-0 transition"
                 style={{
                   background: 'linear-gradient(135deg, #F8F4E6 0%, #fff 50%, #F8F4E6 100%)',
                   border: '6px solid #2C2C2C',
                   boxShadow: '8px 8px 0 #2C2C2C'
                 }}>
              <div className="absolute -top-[2.5vh] left-[3vh] px-6 py-1 text-white font-black text-[2.5vh] border-[6px] border-[#2C2C2C] rounded-full"
                   style={{
                     background: 'linear-gradient(135deg, #789262 0%, #8FA872 50%, #789262 100%)',
                     boxShadow: '4px 4px 0 #2C2C2C'
                   }}>
                决战时间
              </div>
              <div className="flex items-center gap-6 mt-6">
                <input type="range" min="60" max="1200" step="60" value={totalTime} onChange={(e)=>setTotalTime(Number(e.target.value))}
                       className="w-full h-[2vh] bg-[#2C2C2C] rounded-full appearance-none cursor-pointer" />
                <span className="font-black text-[4vh] text-[#2C2C2C] w-24">{totalTime / 60} 刻</span>
              </div>
            </div>
          </div>
          <button onClick={startGame}
                  className="w-1/2 py-[3vh] text-white text-[6vh] font-black tracking-[0.5em] pl-[0.5em] btn-switch z-10"
                  style={{
                    background: 'linear-gradient(135deg, #C93756 0%, #E84A6F 50%, #C93756 100%)',
                    boxShadow: '0 8px 0 #2C2C2C, inset 0 2px 4px rgba(255,255,255,0.3), 0 0 30px rgba(201,55,86,0.5)'
                  }}>
            起鼓开战
          </button>
          <div className="mt-4 text-[2vh] text-[#2C2C2C] opacity-60 z-10 tracking-widest">
            当前题库：{questions.length} 题 · 点击左侧「题库箱」可更换
          </div>
        </div>
      </div>
    );
  }

  if (gameState === 'gameover') {
    const sorted = [...students].sort((a,b)=>b.score-a.score);
    return (
      <div className="w-screen h-screen bg-[#111] flex items-center justify-center font-sans">
        <style>{customStyles}</style>
           <div className="relative flex flex-col items-center justify-center p-8 theme-bamboo bg-theme-bamboo overflow-hidden"
                style={{ aspectRatio: '16/9', width: 'min(100vw, 177.77vh)', height: 'min(100vh, 56.25vw)' }}>
           {renderBackground()}
           <h1 className="text-[12vh] font-black text-[#2C2C2C] mb-[4vh] tracking-widest z-10 font-zhi"
               style={{
                 textShadow: '6px 6px 0 rgba(120,146,98,0.6), 0 0 30px rgba(120,146,98,0.3)',
                 filter: 'drop-shadow(0 0 20px rgba(120,146,98,0.4))'
               }}>
             武林金榜
           </h1>
           <div className="p-8 w-2/3 max-h-[60vh] overflow-y-auto rounded-[40px] z-10"
                style={{
                  background: 'linear-gradient(135deg, #F8F4E6 0%, #fff 50%, #F8F4E6 100%)',
                  border: '8px solid #2C2C2C',
                  boxShadow: '10px 10px 0 #2C2C2C'
                }}>
             {sorted.map((s,i) => (
               <div key={i} className="flex justify-between text-[#2C2C2C] text-[4.5vh] font-black py-4 border-b-[6px] border-[#2C2C2C] border-dashed last:border-0 items-center">
                 <span className="w-20 text-[5vh] text-white border-[4px] border-[#2C2C2C] text-center rounded-2xl"
                       style={{
                         background: i === 0 ? 'linear-gradient(135deg, #F0C239 0%, #FFD700 50%, #F0C239 100%)' :
                                     i === 1 ? 'linear-gradient(135deg, #C0C0C0 0%, #E0E0E0 50%, #C0C0C0 100%)' :
                                     i === 2 ? 'linear-gradient(135deg, #CD7F32 0%, #E89A5A 50%, #CD7F32 100%)' :
                                     'linear-gradient(135deg, #C93756 0%, #E84A6F 50%, #C93756 100%)',
                         boxShadow: '4px 4px 0 #2C2C2C'
                       }}>
                   {i+1}
                 </span>
                 <span className="flex-1 text-center tracking-widest">{s.name}</span>
                 <span style={{color: '#789262'}}>{s.score} 分</span>
               </div>
             ))}
           </div>
           <button onClick={()=>window.location.reload()}
                   className="mt-[5vh] px-16 py-[2.5vh] text-white text-[4.5vh] font-black btn-switch tracking-widest z-10"
                   style={{
                     background: 'linear-gradient(135deg, #177CB0 0%, #2A9FD6 50%, #177CB0 100%)',
                     boxShadow: '0 8px 0 #2C2C2C, inset 0 2px 4px rgba(255,255,255,0.3), 0 0 30px rgba(23,124,176,0.5)'
                   }}>
             再战江湖
           </button>
        </div>
      </div>
    );
  }

  return (
    <div className="w-screen h-screen bg-[#111] flex items-center justify-center overflow-hidden font-sans select-none">
      <style>{customStyles}</style>
      
      {/* 核心 16:9 画布：三系明亮国风背景 */}
      <div className={`relative theme-${currentTheme} bg-theme-${currentTheme} flex flex-col overflow-hidden`}
           style={{ aspectRatio: '16/9', width: 'min(100vw, 177.77vh)', height: 'min(100vh, 56.25vw)' }}>
        
        {renderBackground()}

        {/* === 左右 100% 极致无缝版面布局 === */}
        <div className="no-gap-container">
          {renderHalfScreenCard('left', leftPlayer, leftColor, leftTrophies, leftReady, isLeftDead, leftHP)}
          {renderHalfScreenCard('right', rightPlayer, rightColor, rightTrophies, rightReady, isRightDead, rightHP)}
        </div>

        {/* === 顶部 HUD - 铜钟造型 === */}
        <div className="absolute top-[4vh] left-0 w-full z-[150] flex justify-center pointer-events-none">
          <div className="flex flex-col items-center px-[5vh] py-[1vh] border-[8px] border-[#2C2C2C] rounded-full"
               style={{
                 background: 'linear-gradient(135deg, #F8F4E6 0%, #fff 50%, #F8F4E6 100%)',
                 boxShadow: '8px 8px 0 #2C2C2C, inset 0 2px 4px rgba(255,255,255,0.5), 0 0 20px rgba(240,194,57,0.3)'
               }}>
            <div className="text-[5vh] font-black text-[#2C2C2C] tracking-[0.2em]">{formatTime(timeRemaining)}</div>
            {currentStreak > 0 && (
              <div className="text-[2vh] mt-1 font-black tracking-widest flex items-center gap-1"
                   style={{
                     color: '#C93756',
                     textShadow: '0 0 10px rgba(201,55,86,0.5)',
                     filter: 'drop-shadow(0 0 5px rgba(201,55,86,0.3))'
                   }}>
                🔥 连胜 {currentStreak}
              </div>
            )}
          </div>
        </div>

        {/* 题目展示区 (居中置顶) - 卷轴风格 */}
        {(gameState === 'question_reveal' || gameState === 'battle' || gameState === 'result' || gameState === 'ultimate_impact') && (
          <div className="absolute top-[20vh] left-1/2 -translate-x-1/2 z-[100] px-[6vw] py-[2vh] border-[8px] border-[#2C2C2C] rounded-full pointer-events-none text-center whitespace-nowrap"
               style={{
                 background: 'linear-gradient(135deg, #FFFDF7 0%, #FFF9E6 50%, #FFFDF7 100%)',
                 boxShadow: '8px 8px 0 #2C2C2C, inset 0 2px 4px rgba(240,194,57,0.2), 0 0 30px rgba(240,194,57,0.3)'
               }}>
             <h3 className="text-[4.5vh] font-black text-[#2C2C2C] tracking-[0.2em]"
                 style={{
                   textShadow: '2px 2px 0 rgba(240,194,57,0.3)'
                 }}>
               {questions[currentQIndex]?.q}
             </h3>
          </div>
        )}

        {/* 结果平局展示 */}
        <div className="absolute top-0 left-0 w-full h-full z-[100] pointer-events-none flex flex-col items-center justify-center">
          {gameState === 'result' && actionEffect?.type === 'tie' && (
             <div className="absolute top-[50vh] left-1/2 -translate-x-1/2 -translate-y-1/2 text-center animate-pop z-[150]">
                <div className="text-[10vh] font-black text-[#2C2C2C] tracking-[0.5em] px-16 py-6 rounded-[40px] border-[10px] border-[#2C2C2C]"
                     style={{
                       background: 'linear-gradient(135deg, #F8F4E6 0%, #fff 50%, #F8F4E6 100%)',
                       boxShadow: '15px 15px 0 #2C2C2C, inset 0 4px 8px rgba(255,255,255,0.5), 0 0 40px rgba(240,194,57,0.4)',
                       textShadow: '4px 4px 0 rgba(240,194,57,0.5)'
                     }}>
                  平 局
                </div>
             </div>
          )}
        </div>

        {/* === 漫画全屏黑色斜切蒙版 Cut-in 大招特写 === */}
        {gameState === 'ultimate_cutin' && ultimateName && (
          <div className="cutin-mask">
             <div className="cutin-stripe">
                 <span className="cutin-text">{ultimateName.name}</span>
             </div>
          </div>
        )}

      </div>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
try {
  root.render(<App />);
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="color:red;padding:20px;font-size:16px;">❌ 应用启动失败: ' + e.message + '<br/>请检查浏览器控制台（F12）查看详细错误信息</div>';
}
  </script>
</body>
</html>
