    window.libCheckInterval = setInterval(function() {

    // 15秒后如果还没加载，显示诊断信息

        console.error('❌ 库加载失败，已耗时15秒');

        var react = !!window.React ? '✓ React' : '✗ React';

        root.innerHTML = '<div style="padding:30px;text-align:center;font-size:14px;color:#ff6b6b;">' +

<body>
  <div id="root" style="display:flex;align-items:center;justify-content:center;width:100%;height:100vh;background:#000;color:#fff;font-size:20px;font-family:Arial">
    <div style="text-align:center;">
      <div style="font-size:32px;margin-bottom:10px;">⏳</div>

  </div>

  <script>
    // 实时更新加载状态
    var statusDiv = document.getElementById('status');
    var checkCount = 0;
    var statusInterval = setInterval(function() {
      checkCount++;
      if (window.React) statusDiv.textContent = '✓ React 已加载';
      if (window.ReactDOM) statusDiv.textContent = '✓ React + ReactDOM 已加载';
      if (window.Babel) statusDiv.textContent = '✓ 核心库已加载，正在初始化...';
      if (checkCount > 100) { clearInterval(statusInterval); }

  <script type="text/babel">
const { useState, useEffect, useRef } = React;

// --- 动态加载库 ---
const loadAssets = () => {
  return new Promise((resolve) => {
    let assetCount = 0;
    const checkDone = () => { assetCount--; if (assetCount === 0) resolve(); };
    
    // 加载字体（非必需，失败不影响）
    if (!document.getElementById('font-zhi')) {
      assetCount++;
      const link = document.createElement('link');
      link.id = 'font-zhi';
      link.href = 'https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;700&display=swap';
      link.rel = 'stylesheet';
      link.onerror = checkDone;
      link.onload = checkDone;
      document.head.appendChild(link);
    }
    
    // 加载 XLSX 库（非必需，用于Excel导入，失败不影响游戏运行）
    if (!document.querySelector(`script[src*="xlsx"]`)) {
      assetCount++;
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js';
      script.onerror = checkDone;
      script.onload = checkDone;
      document.head.appendChild(script);
    }
    
    // 如果没有需要加载的资源，立即完成
    if (assetCount === 0) resolve();
  });
};

// --- Web Audio 二次元特效与力量型引擎 ---
const initAudio = () => {
  if (!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (window.audioCtx.state === 'suspended') window.audioCtx.resume();
};

const playSound = (type, param = 0) => {
  try {
    if (!window.audioCtx) return;
    const ctx = window.audioCtx;
    const now = ctx.currentTime;
    
    const playNoise = (duration, filterType, freq, rampFreq) => {
      const bufferSize = ctx.sampleRate * duration;
      const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = ctx.createBufferSource(); noise.buffer = buffer;
      const filter = ctx.createBiquadFilter(); filter.type = filterType;
      filter.frequency.setValueAtTime(freq, now);
      if (rampFreq) filter.frequency.exponentialRampToValueAtTime(rampFreq, now + duration);
      const gain = ctx.createGain(); gain.gain.setValueAtTime(1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
      noise.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      noise.start(now);
    };

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);

    if (type === 'start') {
      osc.type = 'square'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(20, now + 0.3);
      gain.gain.setValueAtTime(1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now); osc.stop(now + 0.3); playNoise(0.2, 'lowpass', 400, 50);
    } else if (type === 'ready') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(2000, now + 0.1);
      gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.4, now+0.02); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'drum_heavy') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(30, now + 0.08);
      gain.gain.setValueAtTime(1.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
      osc.start(now); osc.stop(now + 0.08); playNoise(0.05, 'lowpass', 500, 100);
    } else if (type === 'drum_light') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
      gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
      osc.start(now); osc.stop(now + 0.05);
    } else if (type === 'cutin') {
      // 完美的二次元 Zing 拔剑高光音效
      osc.type = 'sine'; osc.frequency.setValueAtTime(4000, now); osc.frequency.exponentialRampToValueAtTime(8000, now + 0.1);
      gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(1, now+0.02); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
      osc.start(now); osc.stop(now + 0.5); playNoise(0.4, 'highpass', 4000, 8000);
    } else if (type === 'ultimate') {
      if (param === 0) { // 🗡️ 一剑开天门：剑气扫过 + 金属回响 + 低频冲击
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(3000, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.25);
        gain.gain.setValueAtTime(0.8, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
        playNoise(0.4, 'highpass', 5000, 10000);
        setTimeout(() => {
          const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
          o2.connect(g2); g2.connect(ctx.destination);
          o2.type = 'sine'; o2.frequency.setValueAtTime(200, ctx.currentTime); o2.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.3);
          g2.gain.setValueAtTime(1.2, ctx.currentTime); g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
          o2.start(ctx.currentTime); o2.stop(ctx.currentTime + 0.3);
        }, 50);
      } else if (param === 1) { // ⛰️ 泰山压顶：下落呼啸 + 落地重击
        osc.disconnect();
        playNoise(0.3, 'bandpass', 800, 200);
        setTimeout(() => {
          const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
          o2.connect(g2); g2.connect(ctx.destination);
          o2.type = 'sine'; o2.frequency.setValueAtTime(80, ctx.currentTime); o2.frequency.linearRampToValueAtTime(8, ctx.currentTime + 0.7);
          g2.gain.setValueAtTime(2.5, ctx.currentTime); g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.7);
          o2.start(ctx.currentTime); o2.stop(ctx.currentTime + 0.7);
          playNoise(0.6, 'lowpass', 300, 20);
        }, 300);
      } else if (param === 2) { // 🪞 碎空
        osc.type = 'triangle'; osc.frequency.setValueAtTime(3000, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.3);
        gain.gain.setValueAtTime(1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(now); osc.stop(now + 0.3);
        playNoise(0.4, 'bandpass', 4000, 1000);
      } else if (param === 3) { // ☄️ 火弩箭：5连发射 + 5连穿孔轰鸣
        // 阶段1: 发射 (0-0.5s): 高通噪声"咻"，2000Hz → 6000Hz，5次间隔0.1s，音量递增
        const rocketGains = [0.4, 0.5, 0.6, 0.7, 0.8];
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let j = 0; j < buf.length; j++) data[j] = Math.random() * 2 - 1;
            const noise = ctx.createBufferSource(); noise.buffer = buf;
            const filter = ctx.createBiquadFilter(); filter.type = 'highpass';
            filter.frequency.setValueAtTime(2000, ctx.currentTime);
            filter.frequency.exponentialRampToValueAtTime(6000, ctx.currentTime + 0.15);
            const g = ctx.createGain(); g.gain.setValueAtTime(rocketGains[i], ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            noise.connect(filter); filter.connect(g); g.connect(ctx.destination);
            noise.start(ctx.currentTime); noise.stop(ctx.currentTime + 0.2);
          }, i * 100);
        }
        // 阶段2: 穿孔落地 (0.4-1.5s): 5次沉闷击中+穿孔爆炸
        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.type = 'square'; o.frequency.setValueAtTime(150 - i * 15, ctx.currentTime);
            o.frequency.exponentialRampToValueAtTime(40 - i * 8, ctx.currentTime + 0.2);
            g.gain.setValueAtTime(1.5 - i * 0.2, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
            o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.25);
            // 穿孔爆炸音：小幅mid频段突发
            const buf = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let j = 0; j < buf.length; j++) data[j] = Math.random() * 2 - 1;
            const noise = ctx.createBufferSource(); noise.buffer = buf;
            const filter = ctx.createBiquadFilter(); filter.type = 'bandpass';
            filter.frequency.setValueAtTime(1200, ctx.currentTime); 
            filter.Q.setValueAtTime(3, ctx.currentTime);
            const ng = ctx.createGain(); ng.gain.setValueAtTime(0.8, ctx.currentTime);
            ng.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            noise.connect(filter); filter.connect(ng); ng.connect(ctx.destination);
            noise.start(ctx.currentTime); noise.stop(ctx.currentTime + 0.15);
          }, 400 + i * 200);
        }
      } else if (param === 4) { // ⚡ 雷鸣斩：3颗天雷 + 电击着火
        // 主雷击音：低频方波 + 高频电弧
        osc.type = 'square'; osc.frequency.setValueAtTime(180, now);
        osc.frequency.exponentialRampToValueAtTime(8, now + 0.4);
        gain.gain.setValueAtTime(1.8, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
        // 高频电弧噪声
        playNoise(0.5, 'highpass', 5000, 8000);
        // 低通余震
        setTimeout(() => playNoise(0.4, 'lowpass', 1200, 60), 150);
        // 3次雷击撞击音(间隔0.25s)
        for (let i = 0; i < 3; i++) {
          setTimeout(() => {
            const o = ctx.createOscillator(); const g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.type = 'sine'; o.frequency.setValueAtTime(220 + i * 40, ctx.currentTime);
            o.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);
            g.gain.setValueAtTime(0.7 - i * 0.15, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
            o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.15);
            // 白蓝色闪光伴音
            const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let j = 0; j < buf.length; j++) data[j] = Math.random() * 2 - 1;
            const noise = ctx.createBufferSource(); noise.buffer = buf;
            const filter = ctx.createBiquadFilter(); filter.type = 'highpass';
            filter.frequency.setValueAtTime(6000, ctx.currentTime);
            const ng = ctx.createGain(); ng.gain.setValueAtTime(0.6, ctx.currentTime);
            ng.gain.exponentialRampToValueAtTime(0, ctx.currentTime + 0.1);
            noise.connect(filter); filter.connect(ng); ng.connect(ctx.destination);
            noise.start(ctx.currentTime); noise.stop(ctx.currentTime + 0.1);
          }, i * 250);
        }
      }
    } else if (type === 'miss') { // 🩸 内伤 (心脏停跳)
      osc.type = 'sine'; osc.frequency.setValueAtTime(60, now); osc.frequency.exponentialRampToValueAtTime(10, now + 0.4);
      gain.gain.setValueAtTime(1.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4);
      playNoise(0.3, 'lowpass', 150, 30);
    } else if (type === 'rankup') {
      // 中国风五声音阶上行：宫商角徵羽 (C D E G A) + 高八度收尾
      const pentatonic = param === 'gold'
        ? [261.6, 293.7, 329.6, 392, 440, 523.3, 659.3, 1046.5]  // 金：两个八度
        : param === 'silver'
        ? [261.6, 293.7, 329.6, 392, 440, 523.3, 659.3]           // 银：七音
        : [261.6, 293.7, 329.6, 392, 440, 523.3];                  // 铜：六音
      const stepDur = param === 'gold' ? 0.12 : 0.14;
      pentatonic.forEach((freq, i) => {
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'triangle'; o.frequency.setValueAtTime(freq, now + i * stepDur);
        const vol = i === pentatonic.length - 1 ? 1.2 : 0.6;
        g.gain.setValueAtTime(0, now + i * stepDur);
        g.gain.linearRampToValueAtTime(vol, now + i * stepDur + 0.02);
        g.gain.exponentialRampToValueAtTime(0.01, now + i * stepDur + stepDur * 1.5);
        o.start(now + i * stepDur); o.stop(now + i * stepDur + stepDur * 2);
      });
      // 最后加一个钟鸣余韵
      const bellFreq = param === 'gold' ? 1046.5 : param === 'silver' ? 659.3 : 523.3;
      const bo = ctx.createOscillator(); const bg = ctx.createGain();
      bo.connect(bg); bg.connect(ctx.destination);
      bo.type = 'sine'; bo.frequency.setValueAtTime(bellFreq, now + pentatonic.length * stepDur);
      bg.gain.setValueAtTime(1.5, now + pentatonic.length * stepDur);
      bg.gain.exponentialRampToValueAtTime(0.01, now + pentatonic.length * stepDur + 1.5);
      bo.start(now + pentatonic.length * stepDur); bo.stop(now + pentatonic.length * stepDur + 2);
      osc.start(now); osc.stop(now + 0.01); // 消耗掉主 osc
    } else if (type === 'hpburst') { // ❤ 获胜膨胀音效
      osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.15);
      gain.gain.setValueAtTime(0.8, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
      playNoise(0.15, 'highpass', 3000, 6000);
    } else if (type === 'revive') { // 再起复活音效
      osc.type = 'sine'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.3);
      gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(1, now + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      osc.start(now); osc.stop(now + 0.6);
      playNoise(0.4, 'bandpass', 1000, 2000);
    }
  } catch (e) { console.error('Audio play failed', e); }
};

      radial-gradient(circle 20px at 50px 8px, #fff 100%, transparent 100%);
    background-size: 100% 100%;
    background-position: 0 0;
  }
  
  /* 远处山峦 */
  .mario-mountain {
    position: absolute; bottom: 30%; pointer-events: none;
    opacity: 0.3; filter: blur(2px);
  }
  .mario-mountain::before {
    content: ''; position: absolute;
    width: 0; height: 0;
    border-left: 40px solid transparent;
    border-right: 40px solid transparent;
    border-bottom: 60px solid #6B8E23;
  }

  /* 血量显示 - 用♥表示 */
  .hp-display {
    position: absolute; top-[4vh] right-[3vh]; z-index: 50;
    display: flex; gap: 4px; font-size: 3vh;
    filter: drop-shadow(0 0 8px rgba(201,55,86,0.7));
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }
  .hp-display span { color: #C93756; font-weight: bold; }
  
  /* 等级外框 */
  .card-rank-bronze { border: 8px solid #CD7F32; box-shadow: 0 0 20px rgba(205, 127, 50, 0.4), inset 0 0 12px rgba(205, 127, 50, 0.2); }
  .card-rank-silver { border: 8px solid #C0C0C0; box-shadow: 0 0 25px rgba(192, 192, 192, 0.5), inset 0 0 12px rgba(192, 192, 192, 0.3); }
  .card-rank-gold { border: 8px solid #FFD700; box-shadow: 0 0 30px rgba(255, 215, 0, 0.6), inset 0 0 12px rgba(255, 215, 0, 0.4); }
  
  /* 擂主标记 */
  .champion-badge {
    position: absolute; top-4 w-16 h-16 z-40;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(201,55,86,1) 70%);
    border: 4px solid #2C2C2C;
    border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    font-size: 8vh; font-weight: black; color: #C93756;
    text-shadow: 2px 2px 0 #FFD700, -2px -2px 0 #789262;
    box-shadow: 0 0 30px rgba(201,55,86,0.7), inset 0 2px 4px rgba(255,255,255,0.4);
    z-index: 45;
  }
  .champion-badge::after { content: '擂'; }
  .champion-badge-left { left: 12px; }
  .champion-badge-right { right: 12px; }
  
  /* 死亡时半区置灰覆盖 */
  .half-card.dead-overlay {
    filter: grayscale(1) brightness(0.5);
  }
  .half-card.dead-overlay::before {
    content: ''; position: absolute; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.4);
    pointer-events: none;
  }

  /* 祥云飘动 */
  .cloud-deco {
    position: absolute; pointer-events: none; z-index: 1;
    animation: cloudDrift 30s linear infinite;
    opacity: 0.3; filter: blur(1px);
  }
  @keyframes cloudDrift {
    0% { transform: translateX(-10%); }
    100% { transform: translateX(110%); }
  }

  /* 竹叶飘落 */
  @keyframes leafFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
    50% { transform: translateY(50vh) translateX(20px) rotate(180deg); opacity: 0.4; }
    100% { transform: translateY(100vh) translateX(-20px) rotate(360deg); opacity: 0; }
  }

  /* 雪花飘落 */
  @keyframes snowFall {
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.6; }
    50% { transform: translateY(50vh) translateX(30px) rotate(180deg); opacity: 0.5; }
    100% { transform: translateY(100vh) translateX(-30px) rotate(360deg); opacity: 0; }
  }

  /* 按钮脉冲发光 */
  @keyframes pulse {
    0%, 100% { box-shadow: 0 8px 0 #2C2C2C, inset 0 2px 4px rgba(255,255,255,0.5), 0 0 30px rgba(240,194,57,0.5); }
    50% { box-shadow: 0 8px 0 #2C2C2C, inset 0 2px 4px rgba(255,255,255,0.5), 0 0 50px rgba(240,194,57,0.8); }
  }

  /* === 动漫大招切镜 (Ultimate Cut-in) - 子弹时间效果 === */
  .cutin-mask {
    position: absolute; inset: 0; z-index: 300;
    background: transparent;
    backdrop-filter: none;
    display: flex; align-items: center; justify-content: center; 
    overflow: hidden;
  }
  
  /* 子弹时间效果 - 屏幕边缘渐进式暗化 */
  .cutin-mask::before {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, transparent 10%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.6) 100%);
    animation: bulletTimeVignette 1.5s cubic-bezier(0.3, 0.7, 0.3, 1) forwards;
  }
  @keyframes bulletTimeVignette {
    0% { opacity: 0; }
    20% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; }
  }
  
  .cutin-stripe {
    width: 100vw; height: 100vh; z-index: 2;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 20%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.1) 80%, transparent 100%);
    animation: bulletTimeFlash 1.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    border: none; box-shadow: none;
  }
  @keyframes bulletTimeFlash {
    0% { opacity: 0; }
    15% { opacity: 0.8; }
    40%, 60% { opacity: 0.4; }
    100% { opacity: 0; }
  }
  
  .cutin-text {
    position: relative; z-index: 3;
    font-size: 24vh; font-family: 'Zhi Mang Xing', cursive; font-weight: 900;
    background: linear-gradient(135deg, #FF4444 0%, #C93756 25%, #FFD700 50%, #C93756 75%, #FF4444 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 40px #C93756) drop-shadow(0 0 80px rgba(255,215,0,0.5)) drop-shadow(4px 4px 8px rgba(0,0,0,0.8));
    animation: textCutinNew 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    transform-origin: center;
    letter-spacing: 0.1em;
    text-stroke: 2px #2C2C2C;
    paint-order: stroke fill;
  }
  @keyframes textCutinNew {
    0% { transform: scale(0.3) rotate(-20deg) translateY(100px); opacity: 0; filter: drop-shadow(0 0 0px #C93756); }
    12% { transform: scale(1.15) rotate(5deg) translateY(-10px); opacity: 1; filter: drop-shadow(0 0 60px #C93756) drop-shadow(0 0 120px rgba(255,215,0,0.6)); }
    35%, 65% { transform: scale(1) rotate(0deg) translateY(0px); opacity: 1; filter: drop-shadow(0 0 40px #C93756) drop-shadow(0 0 80px rgba(255,215,0,0.5)); }
    100% { transform: scale(0.7) rotate(15deg) translateY(80px); opacity: 0; filter: drop-shadow(0 0 20px #C93756); }
  }
  .cutin-text {
    font-size: 22vh; font-family: 'Zhi Mang Xing'; font-weight: black;
    color: var(--color-zhusha);
    text-shadow: 3px 3px 0 var(--color-jinghuang), 6px 6px 0 rgba(0,0,0,0.3);
    animation: textSlide 1s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
    filter: drop-shadow(0 0 20px rgba(201, 55, 86, 0.6));
  }
  @keyframes textSlide {
    0% { transform: translateX(30vw) scale(0.8); opacity: 0; }
    20%, 80% { transform: translateX(0) scale(1); opacity: 1; }
    100% { transform: translateX(-40vw) scale(0.8); opacity: 0; }
  }

  /* === VFX 动画层 (严格限制在半屏内) - 增强版 === */
  .vfx-layer { position: absolute; inset: 0; pointer-events: none; z-index: 50; overflow: hidden; }

  /* 🗡️ 一剑开天门 - 像素宝剑 + 纵向劈砍 */
  .pixel-sword {
    position: absolute; top: -50%; left: 50%; transform: translateX(-50%);
    width: 60px; height: 200px; animation: swordFall 0.5s ease-in forwards;
  }
  .pixel-sword::before {
    content: ''; position: absolute; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent 20%, #F0C239 20%, #FFD700 40%, #F0C239 60%, transparent 80%);
    background-size: 8px 8px; image-rendering: pixelated;
    box-shadow: 0 0 20px rgba(240, 194, 57, 0.8), 0 0 40px rgba(255, 215, 0, 0.5);
  }
  .pixel-sword::after { /* 剑柄 */
    content: ''; position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 30px;
    background: linear-gradient(90deg, #8B4513 25%, #D2691E 50%, #8B4513 75%);
    background-size: 4px 4px; image-rendering: pixelated;
  }
  @keyframes swordFall {
    0% { top: -50%; opacity: 1; }
    100% { top: 80%; opacity: 1; }
  }
  .sword-slash-line {
    position: absolute; inset: 0;
    background: linear-gradient(down, transparent 48%, rgba(255,255,255,0.95) 49%, #F0C239 50%, rgba(255,255,255,0.95) 51%, transparent 52%);
    animation: slashVertical 0.3s ease-out forwards;
  }
  @keyframes slashVertical {
    0% { clip-path: polygon(50% 0%, 50% 0%, 55% 100%, 45% 100%); opacity: 1; filter: brightness(3) drop-shadow(0 0 30px #F0C239); }
    100% { clip-path: polygon(45% 0%, 55% 0%, 55% 100%, 45% 100%); opacity: 0.5; filter: brightness(1); }
  }

  /* 一剑穿过后的分裂效果 */
  .vfx-slash-hit {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.8) 49%, transparent 50%, transparent 51%, rgba(255,255,255,0.8) 52%);
    animation: slashSplit 0.4s ease-out forwards;
  }
  @keyframes slashSplit {
    0% { clip-path: polygon(0% 50%, 100% 50%, 100% 50%, 0% 50%); opacity: 1; }
    50% { opacity: 1; }
    100% { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); opacity: 0; }
  }

  /* ⛰️ 泰山压顶 - 我的世界风格像素山体 + 停留 + 压扁 */
  .minecraft-mountain {
    position: absolute; top: -60%; left: 50%; transform: translateX(-50%);
    width: 280px; height: 280px; animation: mountainFall 0.8s ease-in forwards;
    z-index: 99; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.6));
  }
  .minecraft-mountain::before { /* 山顶 */
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 65px solid transparent; border-right: 65px solid transparent;
    border-bottom: 80px solid #704214;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    z-index: 2;
  }
  .minecraft-mountain::after { /* 山体主块 */
    content: ''; position: absolute; top: 70px; left: -20px; right: -20px;
    width: 320px; height: 220px;
    background: 
      linear-gradient(90deg, #4a3010 0%, #6B3410 20%, #8B4513 40%, #964B00 60%, #8B4513 80%, #6B3410 100%),
      linear-gradient(180deg, #8B4513 0%, #704214 25%, #5a3410 50%, #4a2810 75%, #3a2010 100%);
    background-size: 16px 16px, 32px 32px;
    image-rendering: pixelated;
    box-shadow: inset 0 8px 16px rgba(0,0,0,0.6), inset -8px 0 16px rgba(0,0,0,0.5);
    z-index: 1;
  }
  @keyframes mountainFall {
    0% { top: -80%; opacity: 0; transform: translateX(-50%) scaleY(0.8); }
    20% { top: 10%; opacity: 1; transform: translateX(-50%) scaleY(1.1); }
    50% { top: 5%; opacity: 1; transform: translateX(-50%) scaleY(1); }
    75% { top: 8%; opacity: 1; transform: translateX(-50%) scaleY(0.95); }
    100% { top: 50%; opacity: 0; transform: translateX(-50%) scaleY(0.5); }
  }

  /* 山体压扁卡片且完全遮盖 */
  .mountain-pressure {
    position: absolute; inset: 0; z-index: 100;
    animation: mountainPressure 0.8s ease-in-out forwards;
    background: linear-gradient(180deg, rgba(80,60,40,0.9) 0%, rgba(100,80,50,0.95) 50%, rgba(60,45,30,0.9) 100%);
  }
  @keyframes mountainPressure {
    0% { transform: scaleY(1); opacity: 0; filter: blur(0px) brightness(1); }
    15% { transform: scaleY(0.8); opacity: 0.3; filter: blur(4px) brightness(0.8); }
    45% { transform: scaleY(0.2); opacity: 1; filter: blur(0px) brightness(0.5); }
    70% { transform: scaleY(0.15); opacity: 1; filter: blur(0px) brightness(0.4); }
    85% { transform: scaleY(0.2); opacity: 0.8; filter: blur(2px) brightness(0.5); }
    100% { transform: scaleY(0.1); opacity: 0; filter: blur(0px) brightness(0); }
  }

  /* 🔨 碎空锤 - 紫色能量锤 + 旋转飞出 */
  .energy-hammer {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 80px; height: 80px; animation: hammerStrike 0.6s ease-out forwards;
  }
  .energy-hammer::before { /* 锤头 */
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 20px;
    background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.9), #9C27B0 60%, #7B1FA2 100%);
    border-radius: 8px;
    box-shadow: 0 0 30px #9C27B0, inset -4px -4px 8px rgba(0,0,0,0.3), inset 4px 4px 8px rgba(255,255,255,0.4);
  }
  .energy-hammer::after { /* 锤柄 */
    content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 12px; height: 40px;
    background: linear-gradient(90deg, #424242 0%, #616161 50%, #424242 100%);
    border-radius: 6px;
  }
  @keyframes hammerStrike {
    0% { transform: translate(-50%, -50%) scale(1.2) rotate(0deg); opacity: 1; }
    15% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(calc(-50% + 100vw), calc(-50% - 100vh)) scale(0.3) rotate(720deg); opacity: 0; }
  }

  /* 🔨 锤击冲击波 */
  .hammer-impact { position: absolute; inset: 0; animation: hammerWave 0.3s ease-out forwards; }
  @keyframes hammerWave {
    0% { transform: scale(0.8); opacity: 1; filter: brightness(3); }
    100% { transform: scale(1.3); opacity: 0; filter: brightness(1); }
  }

  /* ☄️ 火弩箭 - 5条像素火箭 + 穿孔效果 */
  .pixel-rocket { position: absolute; animation: rocketShoot 0.5s linear forwards; }
  .pixel-rocket::before { /* 火箭头 */
    content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent; border-right: 6px solid transparent;
    border-bottom: 12px solid #FF6B35;
    filter: drop-shadow(0 0 8px #EA5514);
  }
  .pixel-rocket::after { /* 火箭身体 */
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 12px; height: 30px;
    background: linear-gradient(90deg, #FFD700 25%, #FFA500 50%, #FFD700 75%);
    background-size: 4px 4px;
    box-shadow: 0 0 15px #EA5514, inset 0 2px 4px rgba(255,255,255,0.3);
  }
  @keyframes rocketShoot { 0% { bottom: 0%; opacity: 1; } 100% { bottom: 100%; opacity: 0; } }

  /* 火箭着陆穿孔 */
  .impact-hole {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.9) 20%, rgba(255,165,0,0.6) 50%, rgba(255,102,52,0.3) 100%);
    animation: pixelHoleForm 0.3s ease-out forwards;
  }
  @keyframes pixelHoleForm {
    0% { transform: scale(0); opacity: 1; filter: brightness(3); }
    100% { transform: scale(1); opacity: 1; filter: brightness(1); }
  }

  /* 穿孔白光射线 */
  .hole-ray { position: absolute; animation: raysRadiate 0.3s ease-out forwards; }
  @keyframes raysRadiate {
    0% { clip-path: circle(0%); opacity: 1; }
    100% { clip-path: circle(200%); opacity: 0; }
  }

  /* 掉血脉冲动效 - 受击后掉血的视觉反馈 */
  .hp-loss-pulse {
    animation: hpLossPulse 0.6s ease-out forwards;
  }
  @keyframes hpLossPulse {
    0% { transform: scale(1); filter: brightness(1.3) drop-shadow(0 0 20px rgba(201,55,86,0.5)); }
    25% { transform: scale(0.97); filter: brightness(1.5); }
    50% { transform: scale(0.95); filter: brightness(1.2) drop-shadow(0 0 30px rgba(201,55,86,0.7)); }
    75% { transform: scale(0.98); filter: brightness(1.1); }
    100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 10px rgba(201,55,86,0.3)); }
  }

  /* 死亡出卡特效 - 浅灰置灰+向下滑出 */
  .death-exit-animation {
    animation: deathExitSlide 0.8s cubic-bezier(0.4, 0, 1, 1) forwards;
  }
  @keyframes deathExitSlide {
    0% { transform: translateY(0) scale(1); opacity: 1; filter: brightness(1); }
    20% { filter: brightness(0.8) grayscale(0.3); }
    40% { filter: brightness(0.7) grayscale(0.6); }
    60% { transform: translateY(5vh); filter: brightness(0.6) grayscale(0.8); }
    85% { transform: translateY(80vh) scale(0.8); opacity: 0.3; filter: brightness(0.3) grayscale(1); }
    100% { transform: translateY(120vh) scale(0.5); opacity: 0; filter: brightness(0) grayscale(1); }
  }

  /* ⚡ 雷鸣斩 - 3颗天雷球 + 不规则裂纹 */
  .thunder-ball {
    position: absolute; top: -50%; border-radius: 50%;
    width: 40px; height: 40px;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.95), #9C27B0 50%, #7B1FA2 100%);
    box-shadow: 0 0 25px #9C27B0, 0 0 50px rgba(156, 39, 176, 0.5);
    animation: thunderFall 0.6s ease-in forwards;
  }
  .thunder-ball::before { /* 闪电纹 */
    content: ''; position: absolute; inset: 0;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 10 L40 35 M50 10 L60 35 M40 35 L45 65 M60 35 L55 65 M45 65 L50 90 M55 65 L50 90" stroke="%23fff" stroke-width="2" stroke-linecap="round"/></svg>');
    background-size: 100% 100%;
    border-radius: 50%;
    filter: drop-shadow(0 0 8px #fff);
  }
  @keyframes thunderFall { 0% { top: -50%; opacity: 1; } 100% { top: 100%; opacity: 0.3; } }

  /* 碎裂裂纹 */
  .crack-lines { position: absolute; inset: 0; animation: crackForm 0.4s ease-out forwards; }
  @keyframes crackForm {
    0% { stroke-dasharray: 0, 1000; opacity: 0; }
    50% { opacity: 1; }
    100% { stroke-dasharray: 1000, 1000; opacity: 0.4; }
  }

  /* 镜面碎片效果 */
  .mirror-shatter {
    position: absolute; inset: 0;
    background: 
      linear-gradient(45deg, transparent 45%, rgba(173, 216, 230, 0.6) 48%, transparent 51%),
      linear-gradient(-45deg, transparent 45%, rgba(173, 216, 230, 0.6) 48%, transparent 51%),
      linear-gradient(30deg, transparent 45%, rgba(173, 216, 230, 0.4) 48%, transparent 51%);
    background-size: 80px 80px, 100px 100px, 60px 60px;
    animation: shatterCrack 0.5s ease-out forwards;
  }
  @keyframes shatterCrack {
    0% { transform: scale(0.9); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: scale(1.2); opacity: 0; }
  }

  /* 🩸 内伤 - 血色收缩 */
  .vfx-injury {
    background: radial-gradient(circle, rgba(44,44,44,0.8) 10%, #7f1d1d 40%, transparent 70%);
    animation: implodeBlood 0.8s ease-in forwards; mix-blend-mode: multiply;
  }
  @keyframes implodeBlood {
    0% { transform: scale(2); opacity: 0; }
    20% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(0.5); opacity: 0; }
  }

  /* === 全屏人物卡物理形变连动 - 增强版 === */

  /* 🗡️ 一剑错位闪白 - 纵向分裂效果 */
  .react-slash { animation: reactSlashNew 0.6s forwards; }
  @keyframes reactSlashNew {
    0%, 100% { transform: scaleY(1); filter: brightness(1); clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
    20% { filter: brightness(3) drop-shadow(0 0 30px #F0C239); clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
    40% { transform: scaleY(0.98); filter: brightness(2.5); }
    50% { 
      clip-path: polygon(0% 0%, 100% 0%, 100% 48%, 0% 48%, 0% 52%, 100% 52%, 100% 100%, 0% 100%);
      transform: translateY(0);
      filter: brightness(2);
    }
    65% { 
      clip-path: polygon(0% 0%, 100% 0%, 100% 48%, 0% 48%, 0% 52%, 100% 52%, 100% 100%, 0% 100%);
      transform: translateY(0);
    }
    75%, 100% {
      clip-path: polygon(0% 0%, 100% 0%, 100% 0%, 0% 0%, 0% 100%, 100% 100%, 100% 100%, 0% 100%);
      transform: translateY(0);
      filter: brightness(1);
    }
  }

  /* ⛰️ 泰山压顶 - 石头堆积埋没（卡片不变形） */
  .react-mountain { animation: none !important; transform: scale(1) !important; filter: none !important; }

  /* 🔨 碎空 - 锤子砸下 + 中心锤痕 + 四周碎裂（卡片不变形） */
  .react-shatter-fx { animation: none !important; transform: scale(1) !important; filter: none !important; }

  /* ☄️ 火弩箭 - 射穿5个火洞 + 燃烧蔓延（卡片不变形） */
  .react-burn { animation: none !important; filter: none !important; transform: scale(1) !important; }

  /* ☄️ 火弩箭：施法方后坐力 - 5连发射 */
  .react-cast-shake { animation: castShakeRocket 0.5s forwards; }
  @keyframes castShakeRocket {
    0%, 100% { transform: translate(0,0) rotate(0deg); }
    10%, 30%, 50%, 70%, 90% { transform: translate(0, -12px) rotate(-1deg); }
    20%, 40%, 60%, 80% { transform: translate(0, 6px) rotate(1deg); }
  }

  /* ⚡ 雷鸣 - 3个雷火球下落 + 抖动电击闪烁（卡片不变形） */

// 传统中国色彩方案
const COLORS = ['#C93756', '#177CB0', '#789262', '#F0C239', '#955539', '#EA5514', '#5AC8FA'];
const THEMES = ['ink', 'bamboo', 'snow'];

const ULTIMATE_INFO = [
  { name: '一剑开天门', reactClass: 'react-slash' }, 
  { name: '泰山压顶', reactClass: 'react-mountain' },
  { name: '碎 空', reactClass: 'react-shatter-fx' }, 
  { name: '火 弩 箭', reactClass: 'react-burn' },
  { name: '雷 鸣', reactClass: 'react-strobe' }
];

const defaultStudents = [
  { id: 1, name: '李白', score: 0 }, { id: 2, name: '杜甫', score: 0 },
  { id: 3, name: '白居易', score: 0 }, { id: 4, name: '苏轼', score: 0 },
  { id: 5, name: '辛弃疾', score: 0 }, { id: 6, name: '李清照', score: 0 },
  { id: 7, name: '王维', score: 0 }, { id: 8, name: '陆游', score: 0 }
];
const defaultQuestions = [
  { q: '北冥有鱼', a: '其名为鲲' }, { q: '上古有大椿者', a: '以八千岁为春' },
  { q: '床前明月光', a: '疑是地上霜' }, { q: '白日依山尽', a: '黄河入海流' },
  { q: '举头望明月', a: '低头思故乡' },
];

// localStorage 辅助函数
const getSafeStorage = (key, defaultValue) => {
  try {
    const item = localStorage.getItem(key);
    return item ? JSON.parse(item) : defaultValue;
  } catch { return defaultValue; }
};
const setSafeStorage = (key, value) => {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) { console.error(e); }
};

function App() {
  const [gameState, setGameState] = useState('setup');
  const [totalTime, setTotalTime] = useState(300);
  const [timeRemaining, setTimeRemaining] = useState(300);
  const [students, setStudents] = useState(defaultStudents);
  const [questions, setQuestions] = useState(defaultQuestions);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [qBankHistory, setQBankHistory] = useState(getSafeStorage('hsljd_qbank_history', {}));
  
  const [currentTheme, setCurrentTheme] = useState('ink');
  
  const [leftPlayer, setLeftPlayer] = useState(null);
  const [rightPlayer, setRightPlayer] = useState(null);
  const [leftColor, setLeftColor] = useState(COLORS[0]);
  const [rightColor, setRightColor] = useState(COLORS[1]);

  const [leftHP, setLeftHP] = useState(1);
  const [rightHP, setRightHP] = useState(1);
  const [leftTrophies, setLeftTrophies] = useState([]);
  const [rightTrophies, setRightTrophies] = useState([]);

  const [leftReady, setLeftReady] = useState(false);
  const [rightReady, setRightReady] = useState(false);
  const [currentStreak, setCurrentStreak] = useState(0);
  const [champSide, setChampSide] = useState(null);

  const [currentQIndex, setCurrentQIndex] = useState(0);
  const [optionSequence, setOptionSequence] = useState([]);
  const [displayedOption, setDisplayedOption] = useState('');
  
  const [ultimateName, setUltimateName] = useState(null);
  const [actionEffect, setActionEffect] = useState(null);
  const [deadSide, setDeadSide] = useState(null);
  const [slotName, setSlotName] = useState('');
  const [rankUpAnim, setRankUpAnim] = useState(null); // { side, rank, playerName }
  const [reviveCount, setReviveCount] = useState({ left: 0, right: 0 });
  const [leiSide, setLeiSide] = useState(null); // 擂主方向
  const [hpBurstSide, setHpBurstSide] = useState(null); // 获胜膨胀特效

  const timersRef = useRef({ main: null, drum: null, pop: null, slot: null, flow: [] });

  useEffect(() => { loadAssets().catch(e=>console.log(e)); }, []);

  const clearFlowTimeouts = () => { timersRef.current.flow.forEach(clearTimeout); timersRef.current.flow = []; };
  const safeTimeout = (callback, delay) => {
    const id = setTimeout(() => { if (timeRemaining > 0 && gameState !== 'gameover') callback(); }, delay);
    timersRef.current.flow.push(id); return id;
  };

  useEffect(() => {
    if (gameState !== 'setup' && gameState !== 'gameover' && gameState !== 'ready') {
      timersRef.current.main = setInterval(() => {
        setTimeRemaining(prev => {
          if (prev <= 1) {
            clearInterval(timersRef.current.main); clearInterval(timersRef.current.drum);
            clearTimeout(timersRef.current.pop); clearInterval(timersRef.current.slot); clearFlowTimeouts();
            setGameState('gameover'); return 0;
          }
          return prev - 1;
        });
      }, 1000);
    }
    return () => clearInterval(timersRef.current.main);
  }, [gameState, timeRemaining]);

  const generateFakeOption = (ans) => {
    if (!ans || ans.length <= 1) return ans + "错";
    let arr = ans.split('');
    if (arr.every(c => c === arr[0])) return ans + "错";
    for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
    const fake = arr.join(''); return fake === ans ? generateFakeOption(ans) : fake;
  };

  const buildOptionSequence = (ans) => {
    let seq = []; let last = '';
    for(let i=0; i<8; i++) {
        let isCorrect = Math.random() < 0.25;
        if (i === 4 && !seq.includes(ans)) isCorrect = true;
        if (i === 7 && !seq.includes(ans)) isCorrect = true;

        if (isCorrect && last !== ans) { seq.push(ans); last = ans; } 
        else {
            let fake = generateFakeOption(ans);
            let attempts = 0;
            while ((fake === last || fake === ans) && attempts < 10) { fake = generateFakeOption(ans); attempts++; }
            seq.push(fake); last = fake;
        }
    }
    return seq;
  };

  const handleFileUpload = (e) => {
    if (!window.XLSX) return alert("核心引擎加载中，请稍候");
    const file = e.target.files[0]; const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = window.XLSX.read(evt.target.result, { type: 'binary' });
        const data = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        if(data.length > 0 && data[0]['姓名']) {
          setStudents(data.map((row, i) => ({ id: i+1, name: row['姓名'], score: 0 })));
          alert("名册载入成功！");
        } else alert("名册格式有误，需包含【姓名】表头。");
      } catch(err) { alert("文件解析失败！"); }
    };
    reader.readAsBinaryString(file);
  };

  // 题库管理函数
  const downloadQBankTemplate = () => {
    if (!window.XLSX) return alert("核心引擎加载中，请稍候");
    const ws = window.XLSX.utils.aoa_to_sheet([['上句（题目）', '下句（答案）'], ['床前明月光', '疑是地上霜'], ['白日依山尽', '黄河入海流']]);
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, '题库');
    window.XLSX.writeFile(wb, '华山论剑题库模板.xlsx');
  };

  const importQBankFromExcel = (e) => {
    if (!window.XLSX) return alert("核心引擎加载中，请稍候");
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = window.XLSX.read(evt.target.result, { type: 'binary' });
        const data = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        const parsed = data.filter(r => r['上句（题目）'] && r['下句（答案）']).map(r => ({ q: String(r['上句（题目）']).trim(), a: String(r['下句（答案）']).trim() }));
        if (parsed.length === 0) return alert("未找到有效题目，请检查表头：【上句（题目）】【下句（答案）】");
        const name = file.name.replace(/\.[^.]+$/, '') || `题库_${Date.now()}`;
        saveQBankToHistory(name, parsed);
        setQuestions(parsed);
        alert(`题库「${name}」载入成功，共 ${parsed.length} 题！`);
      } catch(err) { alert("文件解析失败！"); }
    };
    reader.readAsBinaryString(file);
    e.target.value = '';
  };

  const exportQBankToExcel = () => {
    if (!window.XLSX) return alert("核心引擎加载中，请稍候");
    if (questions.length === 0) return alert("当前题库为空");
    const rows = [['上句（题目）', '下句（答案）'], ...questions.map(q => [q.q, q.a])];
    const ws = window.XLSX.utils.aoa_to_sheet(rows);
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, '题库');
    window.XLSX.writeFile(wb, `华山论剑题库_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.xlsx`);
  };

  const saveQBankToHistory = (name, qs) => {
    const newHistory = { ...qBankHistory, [name]: { questions: qs, savedAt: Date.now() } };
    setQBankHistory(newHistory);
    setSafeStorage('hsljd_qbank_history', newHistory);
  };

  const loadQBankFromHistory = (name) => {
    const bank = qBankHistory[name];
    if (bank) { setQuestions(bank.questions); alert(`已载入题库「${name}」，共 ${bank.questions.length} 题`); }
  };

  const deleteQBankFromHistory = (name) => {
    const newHistory = { ...qBankHistory };
    delete newHistory[name];
    setQBankHistory(newHistory);
    setSafeStorage('hsljd_qbank_history', newHistory);
  };

  // 手动录入题目
  const [manualInput, setManualInput] = useState('');
  const [manualSectionOpen, setManualSectionOpen] = useState(false);
  const [historySectionOpen, setHistorySectionOpen] = useState(true);

  const parseManualInput = () => {
    const lines = manualInput.trim().split('\n').filter(l => l.trim());
    const parsed = [];
    for (const line of lines) {
      const sep = line.includes('|') ? '|' : line.includes('，') ? '，' : line.includes(',') ? ',' : null;
      if (sep) {
        const parts = line.split(sep);
        if (parts.length >= 2) parsed.push({ q: parts[0].trim(), a: parts[1].trim() });
      }
    }
    if (parsed.length === 0) return alert("格式有误！每行一题，用 | 或 ，分隔上下句\n例：床前明月光|疑是地上霜");
    const name = `手动录入_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}`;
    saveQBankToHistory(name, parsed);
    setQuestions(parsed);
    setManualInput('');
    alert(`录入成功！共 ${parsed.length} 题，已保存为「${name}」`);
  };

  const getRandomColor = (...excludes) => {
    const pool = COLORS.filter(c => !excludes.includes(c));
    if (pool.length === 0) return COLORS[Math.floor(Math.random() * COLORS.length)];
    return pool[Math.floor(Math.random() * pool.length)];
  };

  const prepareNextRound = (winnerSide = null) => {
    setCurrentTheme(THEMES[Math.floor(Math.random() * THEMES.length)]);

    let newLeft = leftPlayer; let newRight = rightPlayer;
    let pool = students.filter(s => s.id !== leftPlayer?.id && s.id !== rightPlayer?.id);
    if (pool.length === 0) pool = students;

    if (!winnerSide) {
      newLeft = pool[Math.floor(Math.random() * pool.length)]; pool = pool.filter(s => s.id !== newLeft.id);
      newRight = pool[Math.floor(Math.random() * pool.length)];
      const _newLC = getRandomColor(''); const _newRC = getRandomColor(_newLC);
      setLeftColor(_newLC); setRightColor(_newRC);
      setLeftHP(1); setRightHP(1);
      setLeftTrophies([]); setRightTrophies([]); setCurrentStreak(0); setChampSide(null);
    }
    setLeftPlayer(newLeft); setRightPlayer(newRight);
    
    const qIndex = Math.floor(Math.random() * questions.length); setCurrentQIndex(qIndex);
    setOptionSequence(buildOptionSequence(questions[qIndex].a));

    setLeftReady(false); setRightReady(false); setDisplayedOption('');
    setActionEffect(null); setUltimateName(null); setDeadSide(null); setGameState('ready');
  };

  const startGame = () => {
    initAudio(); playSound('start'); setTimeRemaining(totalTime); 
    setStudents(students.map(s => ({...s, score: 0}))); prepareNextRound();
  };

  const handleReady = (side) => {
    if (gameState !== 'ready') return;
    playSound('ready');
    if (side === 'left') setLeftReady(true);
    if (side === 'right') setRightReady(true);
  };

  useEffect(() => {
    if (gameState === 'ready' && leftReady && rightReady) {
      setGameState('question_reveal');
      safeTimeout(() => { setGameState('battle'); popNextOption(0); }, 1500); 
    }
  }, [leftReady, rightReady, gameState]);

  const popNextOption = (tickIndex) => {
    if (tickIndex < 8) {
      setDisplayedOption(optionSequence[tickIndex]);
      clearInterval(timersRef.current.drum); playSound('drum_heavy');
      timersRef.current.drum = setInterval(() => { playSound('drum_light'); }, 400); 
      timersRef.current.pop = setTimeout(() => { popNextOption(tickIndex + 1); }, 1250);
    } else handleTie();
  };

  const handleTie = () => {
    clearInterval(timersRef.current.drum); playSound('miss');
    setActionEffect({ type: 'tie' }); setGameState('result');
    safeTimeout(() => prepareNextRound(champSide || 'none_died'), 2000);
  };

  const handleAttack = (attackerSide) => {
    if (gameState !== 'battle') return;
    clearTimeout(timersRef.current.pop); clearInterval(timersRef.current.drum);
    
    const defenderSide = attackerSide === 'left' ? 'right' : 'left';
    const isCorrect = displayedOption === questions[currentQIndex].a;
    const uId = Math.floor(Math.random() * 5); // 0-4

    let tempLeftTrophies = [...leftTrophies]; let tempRightTrophies = [...rightTrophies];
    let newLeftHP = leftHP; let newRightHP = rightHP;

    if (isCorrect) {
      if (defenderSide === 'left') { newLeftHP--; tempLeftTrophies.pop(); } 
      else { newRightHP--; tempRightTrophies.pop(); }
      
      setUltimateName(ULTIMATE_INFO[uId]); setGameState('ultimate_cutin'); playSound('cutin');
      
      safeTimeout(() => {
        setUltimateName(null); setGameState('ultimate_impact'); playSound('ultimate', uId);
        // 传递 attackerSide 用于判定施法方动画（如火弩箭抖动）
        setActionEffect({ side: defenderSide, type: 'hit', ultimateId: uId, attacker: attackerSide });
        
        // 判定回合结束（火弩箭燃烧时间较长，延迟多一点）
        const finishDelay = uId === 3 ? 1800 : 1200;
        safeTimeout(() => finalizeRound(tempLeftTrophies, tempRightTrophies, newLeftHP, newRightHP, attackerSide, defenderSide), finishDelay);
      }, 1000); 
    } else {
      if (attackerSide === 'left') { newLeftHP--; tempLeftTrophies.pop(); } 
      else { newRightHP--; tempRightTrophies.pop(); }
      
      setGameState('ultimate_impact'); playSound('miss');
      setActionEffect({ side: attackerSide, type: 'miss' });
      safeTimeout(() => finalizeRound(tempLeftTrophies, tempRightTrophies, newLeftHP, newRightHP, null, null), 1200);
    }
  };

  // 段位判断辅助
  const getRank = (score) => {
    if (score >= 100) return 'gold';
    if (score >= 60) return 'silver';
    if (score >= 30) return 'bronze';
    return null;
  };

  const finalizeRound = (newLeftTrophies, newRightTrophies, newLeftHP, newRightHP, winnerSide, loserSide) => {
    let isLeftDead = newLeftHP <= 0;
    let isRightDead = newRightHP <= 0;

    // 再起机制：死亡时按段位概率复活（每人最多5次）
    const checkRevive = (side, isDead, hp) => {
      if (!isDead) return { isDead: false, hp };
      const player = side === 'left' ? leftPlayer : rightPlayer;
      const score = students.find(s => s.id === player?.id)?.score || 0;
      const rank = getRank(score);
      const reviveProb = rank === 'gold' ? 0.5 : rank === 'silver' ? 0.3 : rank === 'bronze' ? 0.1 : 0;
      const used = reviveCount[side];
      if (reviveProb > 0 && used < 5 && Math.random() < reviveProb) {
        return { isDead: false, hp: 1, revived: true };
      }
      return { isDead: true, hp };
    };

    const leftRevive = checkRevive('left', isLeftDead, newLeftHP);
    const rightRevive = checkRevive('right', isRightDead, newRightHP);

    if (leftRevive.revived) {
      newLeftHP = 1; isLeftDead = false;
      setReviveCount(prev => ({ ...prev, left: prev.left + 1 }));
      playSound('revive');
    }
    if (rightRevive.revived) {
      newRightHP = 1; isRightDead = false;
      setReviveCount(prev => ({ ...prev, right: prev.right + 1 }));
      playSound('revive');
    }

    let nextWinnerSide = null; let tempDead = null;
    if (isLeftDead && !isRightDead) { nextWinnerSide = 'right'; tempDead = 'left'; }
    else if (isRightDead && !isLeftDead) { nextWinnerSide = 'left'; tempDead = 'right'; }
    else if (isLeftDead && isRightDead) nextWinnerSide = null;
    else nextWinnerSide = 'none_died';

    setLeftTrophies(newLeftTrophies); setRightTrophies(newRightTrophies);
    setLeftHP(newLeftHP); setRightHP(newRightHP);
    setGameState('result');

    safeTimeout(() => {
      let updateStudents = [...students];
      let rankUpInfo = null;

      if (winnerSide) {
        setCurrentStreak(prev => prev + 1);
        const winnerId = winnerSide === 'left' ? leftPlayer.id : rightPlayer.id;
        const idx = updateStudents.findIndex(s => s.id === winnerId);
        if (idx !== -1) {
          const oldRank = getRank(updateStudents[idx].score);
          updateStudents[idx] = { ...updateStudents[idx], score: updateStudents[idx].score + 10 };
          const newRank = getRank(updateStudents[idx].score);
          if (newRank && newRank !== oldRank) {
            rankUpInfo = { side: winnerSide, rank: newRank, playerName: updateStudents[idx].name };
          }
        }
      }
      setStudents(updateStudents);

      const proceed = () => {
        if (nextWinnerSide === 'none_died') prepareNextRound(champSide);
        else if (nextWinnerSide) {
          setChampSide(nextWinnerSide); setDeadSide(tempDead);
          startSlotMachine(nextWinnerSide, updateStudents);
        } else prepareNextRound();
      };

      if (rankUpInfo) {
        playSound('rankup', rankUpInfo.rank);
        setRankUpAnim(rankUpInfo);
        safeTimeout(() => { setRankUpAnim(null); proceed(); }, 3200);
      } else {
        proceed();
      }
    }, 1500);
  };

  const startSlotMachine = (winnerSide, currentPool) => {
    setGameState('slot_machine');

    timersRef.current.slot = setInterval(() => {
      setSlotName(pool[tick % pool.length].name);
      if(tick % 2 === 0) playSound('drum_light');
      tick++;
    }, 100);
  };

    clearInterval(timersRef.current.slot); playSound('start');

    if (champSide === 'left') {
      setRightPlayer(newChallenger); setRightColor(getRandomColor(leftColor)); setRightTrophies([]); setRightHP(1);

      setLeftHP(prev => { playSound('hpburst'); setHpBurstSide('left'); setTimeout(() => setHpBurstSide(null), 500); return prev + 1; });

      setLeftPlayer(newChallenger); setLeftColor(getRandomColor(rightColor)); setLeftTrophies([]); setLeftHP(1);

                         transform: `translateY(-50%) rotate(${rotation}deg)`,
